syntax = "proto3";
package liftedinit.billing.v1;

import "cosmos/base/v1beta1/coin.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/manifest-network/manifest-ledger/x/billing/types";

// Params defines the parameters for the billing module.
message Params {
  // denom is the denomination of the token used for billing.
  string denom = 1;

  // min_credit_balance is the minimum credit balance required to create a lease.
  string min_credit_balance = 2 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // max_leases_per_tenant is the maximum number of active leases a tenant can have.
  uint64 max_leases_per_tenant = 3;

  // settlement_batch_size is the number of leases to settle per EndBlock.
  uint64 settlement_batch_size = 4;
}

// LeaseState defines the state of a lease.
enum LeaseState {
  option (gogoproto.goproto_enum_prefix) = false;

  // LEASE_STATE_UNSPECIFIED is the default value.
  LEASE_STATE_UNSPECIFIED = 0;

  // LEASE_STATE_ACTIVE indicates the lease is active and accruing charges.
  LEASE_STATE_ACTIVE = 1;

  // LEASE_STATE_INACTIVE indicates the lease has been closed.
  LEASE_STATE_INACTIVE = 2;
}

// LeaseItem represents a single SKU item within a lease.
message LeaseItem {
  // sku_id is the ID of the SKU being leased.
  uint64 sku_id = 1;

  // quantity is the number of instances of this SKU.
  uint64 quantity = 2;

  // locked_price is the price per unit locked at lease creation (per second, in billing denom).
  string locked_price = 3 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// Lease represents a billing lease between a tenant and provider.
message Lease {
  // id is the unique identifier of the lease.
  uint64 id = 1;

  // tenant is the address of the tenant who created the lease.
  string tenant = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // items is the list of SKU items in this lease.
  repeated LeaseItem items = 3 [(gogoproto.nullable) = false];

  // state is the current state of the lease.
  LeaseState state = 4;

  // created_at is the timestamp when the lease was created.
  google.protobuf.Timestamp created_at = 5
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true];

  // closed_at is the timestamp when the lease was closed (if inactive).
  google.protobuf.Timestamp closed_at = 6 [(gogoproto.stdtime) = true];

  // last_settled_at is the timestamp of the last settlement/withdrawal.
  google.protobuf.Timestamp last_settled_at = 7
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true];
}

// CreditAccount represents a tenant's credit account balance.
message CreditAccount {
  // tenant is the address of the tenant.
  string tenant = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // credit_address is the derived address where credit funds are held.
  string credit_address = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // balance is the current credit balance.
  cosmos.base.v1beta1.Coin balance = 3 [(gogoproto.nullable) = false];
}
