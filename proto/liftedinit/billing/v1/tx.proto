syntax = "proto3";
package liftedinit.billing.v1;

import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "liftedinit/billing/v1/types.proto";

option go_package = "github.com/manifest-network/manifest-ledger/x/billing/types";

// Msg defines the billing module's Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // FundCredit funds a tenant's credit account.
  rpc FundCredit(MsgFundCredit) returns (MsgFundCreditResponse);

  // CreateLease creates a new lease for the tenant.
  rpc CreateLease(MsgCreateLease) returns (MsgCreateLeaseResponse);

  // CloseLease closes an active lease.
  rpc CloseLease(MsgCloseLease) returns (MsgCloseLeaseResponse);

  // Withdraw allows a provider to withdraw accrued funds from a specific lease.
  rpc Withdraw(MsgWithdraw) returns (MsgWithdrawResponse);

  // WithdrawAll allows a provider to withdraw all accrued funds from all their leases.
  rpc WithdrawAll(MsgWithdrawAll) returns (MsgWithdrawAllResponse);

  // UpdateParams updates the module parameters.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

// LeaseItemInput is the input for creating a lease item.
message LeaseItemInput {
  // sku_id is the ID of the SKU to lease.
  uint64 sku_id = 1;

  // quantity is the number of instances.
  uint64 quantity = 2;
}

// MsgFundCredit funds a tenant's credit account.
message MsgFundCredit {
  option (cosmos.msg.v1.signer) = "sender";

  // sender is the address funding the credit account.
  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // tenant is the address of the tenant whose credit account to fund.
  string tenant = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // amount is the amount to fund (must be in billing denom).
  cosmos.base.v1beta1.Coin amount = 3 [(gogoproto.nullable) = false];
}

// MsgFundCreditResponse is the response type for MsgFundCredit.
message MsgFundCreditResponse {
  // credit_address is the derived credit account address.
  string credit_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // new_balance is the credit account balance after funding.
  cosmos.base.v1beta1.Coin new_balance = 2 [(gogoproto.nullable) = false];
}

// MsgCreateLease creates a new lease.
message MsgCreateLease {
  option (cosmos.msg.v1.signer) = "tenant";

  // tenant is the address of the tenant creating the lease.
  string tenant = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // items is the list of SKU items to include in the lease.
  // All SKUs must belong to the same provider.
  repeated LeaseItemInput items = 2 [(gogoproto.nullable) = false];
}

// MsgCreateLeaseResponse is the response type for MsgCreateLease.
message MsgCreateLeaseResponse {
  // lease_id is the ID of the created lease.
  uint64 lease_id = 1;
}

// MsgCloseLease closes an active lease.
message MsgCloseLease {
  option (cosmos.msg.v1.signer) = "sender";

  // sender is the address requesting the closure (tenant, provider, or authority).
  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // lease_id is the ID of the lease to close.
  uint64 lease_id = 2;
}

// MsgCloseLeaseResponse is the response type for MsgCloseLease.
message MsgCloseLeaseResponse {
  // settled_amount is the amount settled at closure.
  cosmos.base.v1beta1.Coin settled_amount = 1 [(gogoproto.nullable) = false];
}

// MsgWithdraw allows a provider to withdraw from a specific lease.
message MsgWithdraw {
  option (cosmos.msg.v1.signer) = "sender";

  // sender is the provider's address or authority.
  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // lease_id is the ID of the lease to withdraw from.
  uint64 lease_id = 2;
}

// MsgWithdrawResponse is the response type for MsgWithdraw.
message MsgWithdrawResponse {
  // amount is the amount withdrawn.
  cosmos.base.v1beta1.Coin amount = 1 [(gogoproto.nullable) = false];

  // payout_address is the address that received the funds.
  string payout_address = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgWithdrawAll allows a provider to withdraw from all their leases.
message MsgWithdrawAll {
  option (cosmos.msg.v1.signer) = "sender";

  // sender is the provider's address or authority.
  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // provider is the provider identifier to withdraw for.
  // If sender is authority, this field specifies which provider.
  // If sender is provider, this field must match sender or be empty.
  string provider = 2;
}

// MsgWithdrawAllResponse is the response type for MsgWithdrawAll.
message MsgWithdrawAllResponse {
  // total_amount is the total amount withdrawn across all leases.
  cosmos.base.v1beta1.Coin total_amount = 1 [(gogoproto.nullable) = false];

  // lease_count is the number of leases withdrawn from.
  uint64 lease_count = 2;

  // payout_address is the address that received the funds.
  string payout_address = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgUpdateParams updates the module parameters.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";

  // authority is the address of the module authority.
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params are the new parameters.
  Params params = 2 [(gogoproto.nullable) = false];
}

// MsgUpdateParamsResponse is the response type for MsgUpdateParams.
message MsgUpdateParamsResponse {}
